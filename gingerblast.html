<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Gingerblast - Lost iOS 2011 HTML5</title>
<style>
  :root{
    --cream:#fff2ca; --brown:#7b3f1d; --deep:#2a1b17; --gold:#f8c857; --red:#d64b34;
  }
  html,body{margin:0;height:100%;overflow:hidden;background:#152d4e;font-family:"Trebuchet MS",Verdana,sans-serif;color:var(--cream);}
  body:before{content:"";position:fixed;inset:0;pointer-events:none;background:linear-gradient(rgba(255,255,255,.07) 50%,rgba(0,0,0,.04) 50%);background-size:100% 4px;mix-blend-mode:soft-light;z-index:8;}
  #wrap{position:relative;width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 50% 15%,#4ba2dc 0,#174577 62%,#0d233e 100%);}
  canvas{width:min(100vw, calc(100vh * 16 / 9));height:min(100vh, calc(100vw * 9 / 16));image-rendering:auto;box-shadow:0 0 0 8px rgba(255,255,255,.12),0 20px 70px rgba(0,0,0,.55);border-radius:18px;background:#68b5e5;touch-action:none;}
  .hud{position:absolute;left:50%;top:12px;transform:translateX(-50%);width:min(96vw,960px);display:flex;gap:8px;align-items:center;justify-content:space-between;z-index:10;pointer-events:none;}
  .panel{pointer-events:auto;background:linear-gradient(#ffeeb3,#d99b43);border:2px solid #fff4c8;border-bottom-color:#6f3517;border-radius:15px;color:#3d1c0d;text-shadow:0 1px 0 rgba(255,255,255,.6);box-shadow:inset 0 2px 0 rgba(255,255,255,.6),0 4px 10px rgba(0,0,0,.3);padding:7px 10px;font-weight:bold;}
  button.panel{cursor:pointer;font-family:inherit;font-size:14px;}
  button.panel:active{transform:translateY(1px);box-shadow:inset 0 1px 4px rgba(0,0,0,.25),0 2px 5px rgba(0,0,0,.25);}
  #levelButtons{position:absolute;left:50%;bottom:10px;transform:translateX(-50%);width:min(96vw,960px);display:flex;gap:5px;justify-content:center;z-index:10;pointer-events:none;}
  #levelButtons button{pointer-events:auto;width:36px;height:31px;padding:0;font-size:13px;}
  #levelButtons button.done{background:linear-gradient(#d8ffd1,#7ed66e);}
  #levelButtons button.active{outline:3px solid rgba(255,255,255,.75);}
  #overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:20;background:radial-gradient(circle,rgba(39,76,113,.55),rgba(0,0,0,.72));}
  #card{width:min(720px,88vw);text-align:center;background:linear-gradient(#8e4c25,#472312);border:4px solid #ffe49d;border-radius:28px;box-shadow:inset 0 3px 0 rgba(255,255,255,.2),0 25px 90px rgba(0,0,0,.65);padding:24px;color:#ffeec2;}
  #card img{max-width:min(480px,80vw);filter:drop-shadow(0 5px 0 #43200d);}
  #card h1{font-size:42px;margin:5px 0 6px;text-shadow:0 4px 0 #2c1308;}
  #card p{line-height:1.35;font-size:16px;margin:10px auto;max-width:610px;color:#fff8dc;}
  #card .small{font-size:13px;opacity:.9;}
  #playBtn{margin-top:10px;font-size:20px;padding:12px 22px;}
  #msg{position:absolute;left:50%;top:70px;transform:translateX(-50%);z-index:11;pointer-events:none;min-width:280px;text-align:center;font-weight:bold;font-size:18px;text-shadow:0 2px 0 rgba(0,0,0,.5);}

  .menuTop{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;}
  .menuTop h1{margin:0;font-size:40px;line-height:1;text-shadow:0 4px 0 #2c1308;}
  .menuHint{font-size:13px;color:#fff6d8;margin:6px 0 12px;}
  #episodeCards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin:12px 0;}
  .episodeCard{cursor:pointer;text-align:left;border:3px solid rgba(255,238,178,.85);border-radius:20px;padding:14px;background:linear-gradient(#ffe8a4,#bd6b2d);color:#3b1b0d;box-shadow:inset 0 2px 0 rgba(255,255,255,.55),0 8px 18px rgba(0,0,0,.32);min-height:104px;}
  .episodeCard.active{outline:4px solid rgba(255,255,255,.75);background:linear-gradient(#fff5bc,#e9953d);}
  .episodeCard.locked{filter:saturate(.35);opacity:.72;}
  .episodeCard strong{display:block;font-size:18px;text-shadow:0 1px 0 rgba(255,255,255,.45);}
  .episodeCard span{display:block;font-size:13px;margin-top:5px;line-height:1.25;}
  #menuLevelGrid{display:grid;grid-template-columns:repeat(10,1fr);gap:6px;margin:14px auto 12px;max-width:610px;}
  #menuLevelGrid button{height:38px;padding:0;font-size:15px;}
  #menuLevelGrid button.done{background:linear-gradient(#d8ffd1,#7ed66e);}
  #menuLevelGrid button.active{outline:3px solid rgba(255,255,255,.75);}
  .menuActions{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;}
  .hud .rightBtns{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;}
  button.panel.used{filter:grayscale(.75);opacity:.65;}
  @media (max-width:760px){#episodeCards{grid-template-columns:1fr}.menuTop h1{font-size:31px}#menuLevelGrid{grid-template-columns:repeat(5,1fr)}}
  @media (max-width:760px){.hud{top:6px}.panel{font-size:12px;padding:5px 7px}#msg{font-size:14px;top:55px}#levelButtons button{width:29px;height:28px}}
</style>
</head>

        if (rel<0) { const imp=-(1.2)*rel/(1/m.mass+1/bl.mass); m.vx+=nx*imp/m.mass; m.vy+=ny*imp/m.mass; bl.vx-=nx*imp/bl.mass; bl.vy-=ny*imp/bl.mass; m.awake=bl.awake=true; const crushScale=topObjectResting?.015:.05; damage(m,Math.abs(imp)*crushScale); damage(bl,Math.abs(imp)*.03); }
      }
    }
    // cheap rect stacking
    for (let i=0;i<state.blocks.length;i++) for (let j=i+1;j<state.blocks.length;j++) {
      const a=state.blocks[i], b=state.blocks[j]; if(a.dead||b.dead) continue;
      if (a.x<a.x+a.w && a.x+b.w>b.x && a.y<a.y+a.h && a.y+b.h>b.y) {}
      if (a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y) {
        const ox=Math.min(a.x+a.w-b.x, b.x+b.w-a.x), oy=Math.min(a.y+a.h-b.y, b.y+b.h-a.y);
        if (ox<oy) { const sx=(a.x+a.w/2 < b.x+b.w/2)?-1:1; a.x+=sx*ox*.5; b.x-=sx*ox*.5; const v=(a.vx-b.vx)*.45; a.vx-=v; b.vx+=v; }
        else { const sy=(a.y+a.h/2 < b.y+b.h/2)?-1:1; a.y+=sy*oy*.5; b.y-=sy*oy*.5; const v=(a.vy-b.vy)*.35; a.vy-=v; b.vy+=v; }
        a.awake=b.awake=true;
      }
    }
  }

  function poolInfoAt(x) {
    if (!state.poolBuckets || !state.poolBuckets.length) return null;
    const i = clamp(Math.floor(x/W*state.poolBuckets.length),0,state.poolBuckets.length-1);
    return state.poolBuckets[i];
  }
  function updateWater(dt) {
    const arr = state.water; const g=620;
    if (arr.length > 850) arr.splice(0, arr.length-850);
    for (const p of arr) {
      const tr = liquidTrait(p.liquid);
      p.age = (p.age||0)+dt; p.life -= dt*.035;
      p.vy += g*dt*(tr.sticky?.92:1);
      p.vx *= Math.pow(tr.sticky?.988:.995, dt*60);
      p.vy *= Math.pow(tr.sticky?.992:.998, dt*60);
      if (tr.soda && Math.random() < dt*2.8) { p.vy -= rand(35,90); p.vx += rand(-35,35); p.foam = true; }
      if (tr.cool && Math.random() < dt*.7) { p.vx *= .94; p.vy *= .95; }
    }
    // fluid particle pressure: makes pooled liquid swish instead of just falling straight down
    for (let i=0;i<arr.length;i++) {
      const a=arr[i];
      for (let j=i+1;j<arr.length;j++) {
        const b=arr[j]; const dx=b.x-a.x, dy=b.y-a.y, d2=dx*dx+dy*dy;
        if (d2<156 && d2>.05) {
          const d=Math.sqrt(d2), push=(12.5-d)*.021;
          const px=dx/d*push, py=dy/d*push;
          a.vx-=px; a.vy-=py; b.vx+=px; b.vy+=py;
        }
      }
    }
    for (const p of arr) {
      const tr = liquidTrait(p.liquid);
      p.x += p.vx*dt; p.y += p.vy*dt;
      if (p.x < p.r) { p.x=p.r; p.vx=Math.abs(p.vx)*.45; }
      if (p.x > W-p.r) { p.x=W-p.r; p.vx=-Math.abs(p.vx)*.45; }
      if (p.y+p.r>507) { p.y=507-p.r; p.vy*=-.08; p.vx*=tr.sticky?.78:.88; p.x += Math.sin(performance.now()/250 + p.y)*.08*tr.push; }
      // liquid can hit surviving targets directly and slowly shove/drown them
      for (const m of state.mugs) {
        if (m.dead) continue;
        const d=len(p.x-m.x,p.y-m.y);
        if (d < m.r + p.r + 2 && d > .01) {
          const nx=(m.x-p.x)/d, ny=(m.y-p.y)/d;
          const hitPower = (Math.abs(p.vx)+Math.abs(p.vy))*.0025*(tr.soda?1.65:1);
          m.vx += nx*hitPower*70/(m.mass||1); m.vy += ny*hitPower*52/(m.mass||1); m.awake=true;
          p.vx -= nx*hitPower*90; p.vy -= ny*hitPower*80;
          if (hitPower > .42 || tr.soda) damage(m, hitPower*(tr.soda?2.4:1.15), p.x, p.y);
        }
      }
      for (const bl of state.blocks) {
        if (bl.dead) continue;
        if (p.x>bl.x-2 && p.x<bl.x+bl.w+2 && p.y>bl.y-2 && p.y<bl.y+bl.h+2) {
          const left=Math.abs(p.x-bl.x), right=Math.abs(bl.x+bl.w-p.x), top=Math.abs(p.y-bl.y), bottom=Math.abs(bl.y+bl.h-p.y);
          const mn=Math.min(left,right,top,bottom);
          if (mn===top) { p.y=bl.y-p.r; p.vy*=-.05; p.vx*=.9; }
          else if (mn===bottom) { p.y=bl.y+bl.h+p.r; p.vy=Math.abs(p.vy)*.15; }
          else if (mn===left) { p.x=bl.x-p.r; p.vx=-Math.abs(p.vx)*.35; }
          else { p.x=bl.x+bl.w+p.r; p.vx=Math.abs(p.vx)*.35; }
          bl.vx += p.vx*.0028*tr.push/(bl.mass||1); bl.vy += p.vy*.0011*tr.buoyancy/(bl.mass||1); bl.awake = bl.awake || Math.abs(p.vx)>45 || tr.soda;
          if (tr.soda && Math.random()<dt*1.4) bl.vy -= 10/(bl.mass||1);
        }
      }
    }

    // Build a lightweight pool model. Anything sitting in a deep bucket floats, drifts, and can drown if it is an enemy.
    const bucketCount=32; const buckets=[]; for(let i=0;i<bucketCount;i++) buckets.push({n:0,y:0,vx:0,soda:0,sticky:0,cool:0,color:"#8bd5ff",surface:510});
    for (const p of arr) if (p.y>438) {
      const bi=clamp(Math.floor(p.x/W*bucketCount),0,bucketCount-1); const b=buckets[bi], tr=liquidTrait(p.liquid);
      b.n++; b.y+=p.y; b.vx+=p.vx; b.color=p.color; if(tr.soda)b.soda++; if(tr.sticky)b.sticky++; if(tr.cool)b.cool++;
    }
    for (let i=0;i<bucketCount;i++) {
      const b=buckets[i];
      if (b.n>0) { b.avgY=b.y/b.n; b.avgVx=b.vx/b.n; b.surface=clamp(507 - Math.min(62, b.n*1.7), 442, 507); }
      else { b.avgY=507; b.avgVx=0; b.surface=510; }
    }
    state.poolBuckets = buckets;

    for (const o of [...allBirds(), ...state.mugs, ...state.blocks]) {
      if (!o || o.dead) continue;
      const ox=o.kind==="block"?o.x+o.w/2:o.x, oy=o.kind==="block"?o.y+o.h/2:o.y;
      let near=0, avx=0, avy=0, soda=0, sticky=0, cool=0;
      for (const p of arr) {
        const rad=o.kind==="block"?Math.max(o.w,o.h)*.62:(o.r||25)+12;
        const d=len(p.x-ox,p.y-oy);
        if (d<rad) {
          const tr=liquidTrait(p.liquid); near++; avx+=p.vx; avy+=p.vy; if(tr.soda)soda++; if(tr.sticky)sticky++; if(tr.cool)cool++;
          p.vx += (o.vx-p.vx)*.018; p.vy += (o.vy-p.vy)*.012;
        }
      }
      const pool=poolInfoAt(ox);
      const bottom=o.kind==="block"?o.y+o.h:oy+(o.r||20);
      const inPool = pool && pool.n>5 && bottom > pool.surface;
      if (near>5 || inPool) {
        const n=Math.max(near, inPool?pool.n:0), flow=(near?avx/near:(pool?pool.avgVx:0));
        const mass=o.mass||1;
        const sodaBoost=(soda>3 || (pool&&pool.soda>4));
        const stickyDrag=(sticky>4 || (pool&&pool.sticky>5));
        o.vx += flow*dt*.18/(mass);
        if (inPool) {
          const depth=clamp((bottom-pool.surface)/65,0,1);
          o.vy -= (o.kind==="block"?220:310)*depth*dt/(mass*.85);
          o.vx *= Math.pow(stickyDrag?.90:.965, dt*60);
          if (sodaBoost) { o.vy -= 80*dt/(mass*.7); if(Math.random()<dt*2) state.shards.push({x:ox+rand(-18,18),y:pool.surface+rand(-4,6),vx:rand(-45,45),vy:rand(-125,-30),life:rand(.25,.55),size:rand(2,5),color:"#ffffff"}); }
        }
        if (near>7) { o.vx*=stickyDrag?Math.pow(.93,dt*60):.986; o.vy*=stickyDrag?Math.pow(.965,dt*60):.982; }
        if (o.kind==="mug") {
          o.soak = (o.soak||0) + dt*(n/9)*(sodaBoost?1.45:1);
          if (n>10 || inPool) damage(o, dt*(n*.23 + (sodaBoost?2.6:0.65)), ox, oy);
          if (o.soak > 2.6 && (near>9 || inPool)) breakMug(o, ox, oy);
        } else if (o.kind==="block") {
          if (sodaBoost) o.awake = true;
          if (stickyDrag) o.vx*=.98;
        } else if (o.kind==="bird") {
          o.wetness = (o.wetness||0) + dt*(n/12);
          if (sodaBoost) o.vy -= 22*dt;
        }
      }
    }
    state.water = arr.filter(p=>p.life>0 && p.y<545);
  }
  function updateShards(dt) {
    for (const s of state.shards) { s.vy += 650*dt; s.x+=s.vx*dt; s.y+=s.vy*dt; s.vx*=.99; if(s.y>508){s.y=508;s.vy*=-.18;s.vx*=.8} s.life-=dt; }
    state.shards = state.shards.filter(s=>s.life>0);
  }

  function draw() {
    const bg=ASSETS["bg_2011.png"];
    if (bg && bg.ok) ctx.drawImage(bg,0,0,W,H); else drawFallbackBg();
    drawWorldChrome(); drawSling();
    if (state.current && !state.current.launched) drawAim();
    drawWater(false);
    for (const bl of state.blocks) if(!bl.dead) drawBlock(bl);
    for (const m of state.mugs) if(!m.dead) drawMug(m);
    for (const b of allBirds()) drawBird(b);
    if (state.eagle) drawMighty(state.eagle);
    drawWater(true);
    drawShards(); drawQueue(); drawVignette();
  }
  function drawFallbackBg() {
    const grd=ctx.createLinearGradient(0,0,0,H); grd.addColorStop(0,"#78c5ef"); grd.addColorStop(.68,"#3f8ec4"); grd.addColorStop(.69,"#64b760"); grd.addColorStop(1,"#37843c"); ctx.fillStyle=grd; ctx.fillRect(0,0,W,H);
  }
  function drawWorldChrome() {
    ctx.save(); ctx.fillStyle="rgba(70,55,30,.33)"; ctx.fillRect(0,506,W,12); ctx.fillStyle="rgba(255,255,255,.18)"; ctx.fillRect(0,423,W,2); ctx.restore();
  }
  function drawSling() {
    const img=ASSETS["slingshot.png"]; if(img&&img.ok) ctx.drawImage(img,sling.x-64,sling.y-94,128,128); else {ctx.strokeStyle="#6b3518";ctx.lineWidth=12;ctx.beginPath();ctx.moveTo(sling.x,sling.y+50);ctx.lineTo(sling.x-30,sling.y-55);ctx.moveTo(sling.x,sling.y+50);ctx.lineTo(sling.x+30,sling.y-55);ctx.stroke();}
    if (state.dragging && state.current) { ctx.strokeStyle="#3b2416"; ctx.lineWidth=5; ctx.beginPath(); ctx.moveTo(sling.x-28,sling.y-42); ctx.lineTo(state.current.x,state.current.y); ctx.lineTo(sling.x+28,sling.y-42); ctx.stroke(); }
  }
  function drawAim() {
    if (!state.dragging || !state.current) return;
    const b=state.current; const vx=(sling.x-b.x)*7.15, vy=(sling.y-b.y)*7.15; let x=sling.x,y=sling.y;
    ctx.save(); ctx.fillStyle="rgba(255,255,255,.55)";
    for (let i=1;i<18;i++) { const t=i*.105; const px=x+vx*t, py=y+vy*t+365*t*t; ctx.globalAlpha=Math.max(0,1-i/20); ctx.beginPath(); ctx.arc(px,py,4,0,Math.PI*2); ctx.fill(); }
    ctx.restore();
  }
  function drawBird(b) {
    ctx.save();
    for (let i=0;i<b.trail.length;i++) { const p=b.trail[i]; ctx.globalAlpha=i/b.trail.length*.22; ctx.fillStyle="#fff0c0"; ctx.beginPath(); ctx.arc(p.x,p.y,b.r*(i/b.trail.length),0,Math.PI*2); ctx.fill(); }
    ctx.globalAlpha=1; ctx.translate(b.x,b.y); ctx.rotate(b.rot||0);
    const img=ASSETS[b.sprite]; if(img&&img.ok) ctx.drawImage(img,-b.r*1.55,-b.r*1.55,b.r*3.1,b.r*3.1); else { ctx.fillStyle="#b86c31"; ctx.beginPath(); ctx.arc(0,0,b.r,0,Math.PI*2); ctx.fill(); ctx.fillStyle="#2b1508"; ctx.beginPath(); ctx.arc(-7,-5,3,0,7);ctx.arc(7,-5,3,0,7);ctx.fill(); }
    ctx.restore();
  }
  function drawBlock(b) {
    ctx.save(); ctx.translate(b.x+b.w/2,b.y+b.h/2); ctx.rotate(b.angle*.08); ctx.globalAlpha=clamp(b.hp/(blockDefs[b.type].hp*.75),.55,1);
    const img=ASSETS[blockDefs[b.type].sprite];
    if(img&&img.ok) { const pat=ctx.createPattern(img,"repeat"); ctx.fillStyle=pat; roundRect(ctx,-b.w/2,-b.h/2,b.w,b.h,6); ctx.fill(); ctx.strokeStyle="rgba(50,35,25,.55)"; ctx.lineWidth=2; ctx.stroke(); }
    else { ctx.fillStyle=blockDefs[b.type].tint; roundRect(ctx,-b.w/2,-b.h/2,b.w,b.h,6); ctx.fill(); }
    ctx.restore();
  }
  function drawMug(m) {
    ctx.save(); ctx.translate(m.x,m.y); ctx.rotate(Math.sin(m.wobble)*.08 + m.vx*.0004);
    const img=ASSETS[m.sprite];
    if(img&&img.ok) {
      if (m.isBar) ctx.drawImage(img,-39,-39,78,78); else ctx.drawImage(img,-35,-38,70,70);
    } else if (m.isBar) {
      ctx.fillStyle=liquidColors[m.liquid]||"#5a2b1c"; roundRect(ctx,-24,-31,48,62,8); ctx.fill(); ctx.strokeStyle="#2c1308"; ctx.lineWidth=3; ctx.stroke();
    } else { ctx.fillStyle="#f4f4ee"; roundRect(ctx,-22,-25,44,52,10); ctx.fill(); ctx.fillStyle=liquidColors[m.liquid]||"#8bd5ff"; ctx.beginPath(); ctx.ellipse(0,-22,17,7,0,0,7); ctx.fill(); }
    ctx.restore();
  }
  function drawMighty(e) {
    ctx.save(); ctx.translate(e.x,e.y); ctx.rotate(Math.sin(e.flap)*.12);
    const img=ASSETS["mighty_treat.png"];
    if (img&&img.ok) ctx.drawImage(img,-78,-54,156,108);
    else { ctx.fillStyle="#ffe99b"; ctx.beginPath(); ctx.ellipse(0,0,72,32,0,0,7); ctx.fill(); ctx.fillStyle="#b56d2e"; ctx.beginPath(); ctx.arc(0,-8,25,0,7); ctx.fill(); }
    ctx.restore();
  }
  function drawWater(top) {
    if (!state.water.length) return;
    ctx.save(); ctx.globalCompositeOperation = top ? "source-over" : "multiply";
    for (const p of state.water) {
      if ((!top && p.y<462) || (top && p.y>=462)) continue;
      const r=p.r*(top?1.15:1.45); const g=ctx.createRadialGradient(p.x-r*.3,p.y-r*.35,1,p.x,p.y,r*1.6);
      g.addColorStop(0,"rgba(255,255,255,.75)"); g.addColorStop(.18,p.foam?"rgba(255,255,255,.65)":p.color); g.addColorStop(1,hexAlpha(p.color,.23));
      ctx.fillStyle=g; ctx.beginPath(); ctx.ellipse(p.x,p.y,r*1.25,r*.8,Math.sin(p.x*.04+p.y*.02)*.28,0,Math.PI*2); ctx.fill();
    }
    // pooled surface shimmer; this matches the gameplay pool model used for floating and drowning
    const buckets=state.poolBuckets&&state.poolBuckets.length?state.poolBuckets:[];
    ctx.globalAlpha=.46; ctx.beginPath();
    let started=false; const t=performance.now()/260;
    for(let i=0;i<buckets.length;i++) if(buckets[i].n>4) { const x=i*W/buckets.length+W/buckets.length/2; const y=clamp(buckets[i].surface + Math.sin(t+i)*4,442,507); if(!started){ctx.moveTo(x,y); started=true;} else ctx.lineTo(x,y); }
    if(started){
      const color = buckets.find(b=>b.n>4)?.color || "#8bd5ff";
      const pg=ctx.createLinearGradient(0,450,0,508); pg.addColorStop(0,hexAlpha(color,.42)); pg.addColorStop(1,hexAlpha(color,.23));
      ctx.fillStyle=pg; ctx.lineTo(W,508);ctx.lineTo(0,508);ctx.closePath();ctx.fill();
      ctx.globalAlpha=.55; ctx.strokeStyle="rgba(255,255,255,.46)"; ctx.lineWidth=2; ctx.stroke();
    }
    ctx.restore();
  }
  function drawShards() {
    ctx.save();
    for (const s of state.shards) { ctx.globalAlpha=clamp(s.life,0,1); ctx.fillStyle=s.color; ctx.save(); ctx.translate(s.x,s.y); ctx.rotate(s.x*.03+s.y*.02); ctx.fillRect(-s.size/2,-s.size/2,s.size,s.size*.66); ctx.restore(); }
    ctx.restore();
  }
  function drawQueue() {
    ctx.save(); let x=52; const y=485;
    for (let i=state.queueIndex+1; i<state.birds.length; i++) { const def=birdDefs[state.birds[i]], img=ASSETS[def.sprite]; if(img&&img.ok) ctx.drawImage(img,x,y-25,42,42); else {ctx.fillStyle="#b86c31";ctx.beginPath();ctx.arc(x+21,y-4,16,0,7);ctx.fill();} x+=38; }
    ctx.fillStyle="rgba(255,255,255,.75)"; ctx.font="bold 13px Trebuchet MS"; ctx.fillText("next",52,522); ctx.restore();
  }
  function drawVignette() {
    const g=ctx.createRadialGradient(W/2,H/2,120,W/2,H/2,620); g.addColorStop(0,"rgba(0,0,0,0)"); g.addColorStop(1,"rgba(0,0,0,.34)"); ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  }
  function roundRect(c,x,y,w,h,r){ c.beginPath(); c.moveTo(x+r,y); c.arcTo(x+w,y,x+w,y+h,r); c.arcTo(x+w,y+h,x,y+h,r); c.arcTo(x,y+h,x,y,r); c.arcTo(x,y,x+w,y,r); c.closePath(); }
  function hexAlpha(hex,a) {
    const c = hex.replace("#",""); if(c.length!==6) return `rgba(120,205,255,${a})`;
    const r=parseInt(c.slice(0,2),16), g=parseInt(c.slice(2,4),16), b=parseInt(c.slice(4,6),16); return `rgba(${r},${g},${b},${a})`;
  }

  let last=performance.now();
  function loop(now) { const dt=clamp((now-last)/1000,0,.033); last=now; for(let i=0;i<2;i++) step(dt/2); draw(); requestAnimationFrame(loop); }
  requestAnimationFrame(loop);
  updateButtons();
})();
</script>
